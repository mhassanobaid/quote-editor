
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: quote-editor-prod
    container_name: rails_app
    restart: always
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
    ports:
      - "3000:3000"
    
    command: >
      bash -c "
        echo '🚀 Starting Rails...' &&
        /wait-for-db.sh &&
        bundle exec rails db:prepare &&
        rm -f tmp/pids/server.pid &&
        bundle exec rails s -b 0.0.0.0 -e production
      "
  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: sidekiq_worker
    environment:
      RAILS_ENV: production
    command: >
      bash -c "
        /wait-for-db.sh &&
        bundle exec sidekiq -e production
      "
    env_file:
      - .env.production

volumes:
  postgres_data:
